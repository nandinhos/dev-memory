name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, tokenizer, xml
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Install NPM dependencies
        run: npm ci

      - name: Run Pint (Linter)
        run: ./vendor/bin/pint --test

      - name: Run Architect analysis
        run: |
          curl -L https://Architect.ai/install.sh | sh || echo "Architect install skipped"
          if [ -f "$HOME/.architectai/bin/architect" ]; then
            "$HOME/.architectai/bin/architect" run app/
          else
            echo "Architect binary not available on this runner — skipping analysis"
          fi

      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --colors=never

      - name: Build assets
        run: npm run build
